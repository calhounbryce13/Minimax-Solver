<!DOCTYPE html>
    <html lang="en">
        <head>
            <link rel="stylesheet" href="main.css">
            <script src="script.js"></script>
        </head>
        <body>
            <div id="game-controls">
                <div id="reset-container">
                    <button id="reset" class="icon hover-buttons">
                    </button>
                </div>
                <div id="game">
                    <div class="row">
                        <div class="cell icon"></div>
                        <div class="cell icon"></div>
                        <div class="cell icon"></div>
                    </div>
                    <div class="row">
                        <div class="cell icon"></div>
                        <div class="cell icon"></div>
                        <div class="cell icon"></div>
                    </div>
                    <div class="row">
                        <div class="cell icon"></div>
                        <div class="cell icon"></div>
                        <div class="cell icon"></div>
                    </div>
                </div>
                <div id="player-selection">
                    <div>
                        <p>Play As:</p>
                    </div>
                    <div id="tokens">
                        <div id="x" class="icon hover-buttons">
                        </div>
                        <div id="o" class="icon hover-buttons">
                        </div>
                    </div>
                    <div id="canvas">
                    </div>
                </div>
                <button id="start">
                    Play Game
                </button>
            </div>
        </body>
    </html>
